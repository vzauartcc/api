name: Build and Deploy Staging

on:
  push:
    branches:
      - 'staging'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: vzauartcc/api
  K8_NAMESPACE: zau-staging-web-stack
  DEPLOYMENT_NAME: api-dev

jobs:
  Build-and-Push-to-GHCR:
    runs-on: ubuntu-latest

    if: |
      !(github.event.head_commit.author.email == '29139614+renovate[bot]@users.noreply.github.com' ||
      github.event.head_commit.committer.email == '29139614+renovate[bot]@users.noreply.github.com')

    steps:
      - name: Checkout master
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  Deploy-to-Staging:
    needs: Build-and-Push-to-GHCR
    environment: staging
    runs-on: ubuntu-latest
    if: |
      !(github.event.head_commit.author.email == '29139614+renovate[bot]@users.noreply.github.com' ||
      github.event.head_commit.committer.email == '29139614+renovate[bot]@users.noreply.github.com')

    steps:
      - name: Initialize doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log into K8s cluster
        run: doctl kubernetes cluster kubeconfig save --expiry-seconds 600 zau-k8s

      - name: Deploy image to cluster
        run: kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} ${{ env.DEPLOYMENT_NAME }}=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} --record -n ${{ env.K8_NAMESPACE }}

      - name: Verify deployment
        run: kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} -n ${{ env.K8_NAMESPACE }}
